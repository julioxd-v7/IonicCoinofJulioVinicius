<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Ajustes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">

  <p class="section-eyebrow">Atualização de taxas</p>

  <ion-card class="settings-card">
    <ion-card-content>
      <ion-item lines="none">
        <ion-label position="stacked">Frequência</ion-label>
        <ion-select
          [(ngModel)]="settings.updateFrequency"
          (ionChange)="onSettingsChange()"
          interface="popover"
        >
          <ion-select-option value="manual">Manual (ao abrir o app)</ion-select-option>
          <ion-select-option value="hourly">A cada hora</ion-select-option>
          <ion-select-option value="daily">Diariamente</ion-select-option>
        </ion-select>
      </ion-item>
    </ion-card-content>
  </ion-card>

  <p class="section-eyebrow">Notificações</p>

  <ion-card class="settings-card">
    <ion-card-content>
      <ion-item lines="none" class="toggle-item">
        <ion-label>
          <h3>Variações significativas</h3>
          <p>Avisar quando a taxa mudar bastante</p>
        </ion-label>
        <ion-toggle
          slot="end"
          [(ngModel)]="settings.notifyOnBigChange"
          (ionChange)="onSettingsChange()"
        ></ion-toggle>
      </ion-item>
    </ion-card-content>
  </ion-card>

</ion-content>

<app-footer></app-footer>
